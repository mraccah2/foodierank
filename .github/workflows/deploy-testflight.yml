name: iOS — Build & Upload to TestFlight

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "ios/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "assets/**"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: testflight-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: [self-hosted, macos, ios]
    timeout-minutes: 45

    steps:
      - name: Clean up old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            for (const artifact of artifacts.data.artifacts) {
              if (artifact.name.startsWith('foodierank-ios-') && !artifact.expired) {
                console.log(`Deleting ${artifact.name} (${(artifact.size_in_bytes / 1048576).toFixed(1)} MB)`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              }
            }

      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Set up Flutter
        run: flutter --version

      - name: Install signing certificate & provisioning profile
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$IOS_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain | tr -d ' "')
          ORIGINAL_KEYCHAIN_LIST=$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          echo "original_default_keychain=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"
          echo "original_keychain_list=$ORIGINAL_KEYCHAIN_LIST" >> "$GITHUB_ENV"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $ORIGINAL_KEYCHAIN_LIST
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PROFILE_PLIST")
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision
          rm "$PROFILE_PATH"
          echo "installed_profile_path=$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" >> "$GITHUB_ENV"

          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "keychain_password=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "app_profile_uuid=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "app_profile_name=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile: name=$PROFILE_NAME uuid=$PROFILE_UUID"

      # Cross-check our GH-secret cert + profile against Apple before any
      # expensive build steps. Catches the May 2026 failure mode (team-wide
      # distribution cert revoked, profile silently INVALID) in seconds
      # instead of 5 minutes deep into xcodebuild. Same script as
      # mraccah2/listo's scripts/verify_ios_signing.py — keep them in sync
      # when the contract changes.
      - name: Verify signing state vs Apple
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          python3 -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install --quiet --timeout 30 PyJWT cryptography
          /tmp/verify-venv/bin/python3 scripts/verify_ios_signing.py \
            --bundle-id ${{ vars.IOS_BUNDLE_ID || 'com.foodierank.foodierank' }}

      - name: Set build number
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          sed -i '' "s/^version:.*/version: ${CURRENT_VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          echo "Version: ${CURRENT_VERSION}+${BUILD_NUMBER}"

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: |
          # Try without --repo-update first; if it fails (missing pod), retry with refresh.
          pod install || pod install --repo-update

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-*

      - name: Build Flutter framework (no codesign)
        env:
          IOS_MAPS_API_KEY: ${{ secrets.IOS_MAPS_API_KEY }}
          IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.foodierank.foodierank' }}
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=IOS_MAPS_API_KEY="$IOS_MAPS_API_KEY" \
            --dart-define=IOS_BUNDLE_ID="$IOS_BUNDLE_ID"

      - name: Configure manual signing for CI (Runner target only)
        env:
          BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.foodierank.foodierank' }}
        run: |
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/"iPhone Developer"/"Apple Distribution"/g' "$PBXPROJ"
          python3 -c "
          import os
          bundle_id = os.environ['BUNDLE_ID']
          profile_name = os.environ['app_profile_name']
          text = open('$PBXPROJ').read()
          text = text.replace(
              'PRODUCT_BUNDLE_IDENTIFIER = %s;' % bundle_id,
              'PRODUCT_BUNDLE_IDENTIFIER = %s; PROVISIONING_PROFILE_SPECIFIER = \"%s\";' % (bundle_id, profile_name)
          )
          open('$PBXPROJ', 'w').write(text)
          "
          echo '--- relevant Runner build settings ---'
          grep -E 'CODE_SIGN|PROVISIONING|PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM' "$PBXPROJ" | head -30

      - name: Install ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Write ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ vars.APPLE_TEAM_ID || 'XTWDQNWHQJ' }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ vars.IOS_BUNDLE_ID || 'com.foodierank.foodierank' }}</key>
              <string>$app_profile_name</string>
            </dict>
            <key>destination</key>
            <string>upload</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=${{ vars.APPLE_TEAM_ID || 'XTWDQNWHQJ' }} \
            OTHER_CODE_SIGN_FLAGS="--keychain $keychain_path" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA & upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Submit for App Store review (auto-release after approval)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_RELEASE_TYPE: AFTER_APPROVAL
          ASC_BUILD_VERSION: ${{ github.run_number }}
        run: |
          python3 -m pip install --quiet --user --break-system-packages pyjwt cryptography || \
            python3 -m pip install --quiet --user pyjwt cryptography
          # Release notes = commit subject line only (not the full multi-line
          # body), capped at 500 chars to stay well under ASC's limit.
          SUBJECT="$(git log -1 --pretty=%s)"
          export ASC_WHATS_NEW="${SUBJECT:0:500}"
          python3 scripts/asc_submit_for_review.py

      - name: Clean up signing, keys & build artifacts
        if: always()
        run: |
          rm -f ~/private_keys/AuthKey_*.p8
          if [ -n "$installed_profile_path" ] && [ -f "$installed_profile_path" ]; then
            rm -f "$installed_profile_path" || true
          fi
          if [ -n "$original_default_keychain" ]; then
            security default-keychain -s "$original_default_keychain" 2>/dev/null || true
          fi
          if [ -n "$original_keychain_list" ]; then
            security list-keychains -d user -s $original_keychain_list 2>/dev/null || true
          fi
          if [ -n "$keychain_path" ]; then
            security delete-keychain "$keychain_path" 2>/dev/null || true
          fi
          # Reclaim disk: archives can be GBs each.
          rm -rf "$RUNNER_TEMP/Runner.xcarchive" "$RUNNER_TEMP/export" 2>/dev/null || true
          rm -rf ~/Library/Developer/Xcode/DerivedData/Runner-* 2>/dev/null || true

