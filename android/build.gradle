// AGP and Kotlin plugin versions are declared once in settings.gradle's
// plugins block. Do NOT re-pin them here with a buildscript classpath — a
// second, conflicting version is what silently overrode the toolchain.

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
