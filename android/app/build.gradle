plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// Google Maps API key for the native manifest meta-data.
// Resolved from (in order): the MAPS_API_KEY env var, then `MAPS_API_KEY`
// in android/local.properties (gitignored). Never hardcode it here.
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { localProperties.load(it) }
}
def mapsApiKey = System.getenv('MAPS_API_KEY') ?: localProperties.getProperty('MAPS_API_KEY', '')

configurations.all {
    resolutionStrategy {
        force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:2.1.0'
    }
}

android {
    namespace = "com.foodierank.foodierank"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId = "com.foodierank.foodierank"
        minSdkVersion = flutter.minSdkVersion
        targetSdkVersion = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Injected into AndroidManifest.xml as ${MAPS_API_KEY}.
        manifestPlaceholders += [MAPS_API_KEY: mapsApiKey]
    }

    signingConfigs {
        // Only define a real release signing config when key.properties exists
        // (i.e. you've set up your own upload keystore). Without it, release
        // builds fall back to the debug key so CI and contributors can still
        // produce an installable APK/AAB. A debug-signed build is NOT
        // acceptable for the Play Store — see RELEASING.md.
        if (keystorePropertiesFile.exists()) {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
